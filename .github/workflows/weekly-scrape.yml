name: Golf Data Update

on:
  schedule:
    # --- OFF-WEEK (Mon-Wed): 1x/day early morning ---
    - cron: '0 6 * * 1'    # Monday 6AM UTC (2AM ET) — early odds
    - cron: '0 6 * * 2'    # Tuesday 6AM UTC
    - cron: '0 6 * * 3'    # Wednesday 6AM UTC — firmed-up odds before R1

    # --- TOURNAMENT WEEK (Thu-Sun): every 3 hours during play ---
    # Covers 7AM ET through 10PM ET (peak play + evening line moves)
    - cron: '0 11 * * 4'   # Thursday  7AM ET — pre-R1 morning
    - cron: '0 14 * * 4'   # Thursday 10AM ET — R1 in progress
    - cron: '0 17 * * 4'   # Thursday  1PM ET — R1 afternoon
    - cron: '0 20 * * 4'   # Thursday  4PM ET — R1 leaders posting
    - cron: '0 23 * * 4'   # Thursday  7PM ET — R1 complete
    - cron: '0 2 * * 5'    # Thursday 10PM ET — overnight lines

    - cron: '0 11 * * 5'   # Friday    7AM ET — pre-R2
    - cron: '0 14 * * 5'   # Friday   10AM ET — R2 in progress
    - cron: '0 17 * * 5'   # Friday    1PM ET — cut line forming
    - cron: '0 20 * * 5'   # Friday    4PM ET — cut confirmed
    - cron: '0 23 * * 5'   # Friday    7PM ET — post-cut lines

    - cron: '0 11 * * 6'   # Saturday  7AM ET — moving day
    - cron: '0 14 * * 6'   # Saturday 10AM ET — R3 in progress
    - cron: '0 17 * * 6'   # Saturday  1PM ET — leaders pulling away
    - cron: '0 20 * * 6'   # Saturday  4PM ET — R3 leaders
    - cron: '0 23 * * 6'   # Saturday  7PM ET — Sunday odds set

    - cron: '0 11 * * 0'   # Sunday    7AM ET — final round
    - cron: '0 14 * * 0'   # Sunday   10AM ET — back 9 push
    - cron: '0 17 * * 0'   # Sunday    1PM ET — leaders on back 9
    - cron: '0 20 * * 0'   # Sunday    4PM ET — champion crowned
    - cron: '0 23 * * 0'   # Sunday    7PM ET — final update
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'PropsBot-GolfIntel.html'
      - '.github/workflows/weekly-scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scraper.py

      - name: Verify output
        run: |
          echo "Checking golf-data.json..."
          ls -la golf-data.json
          python -c "import json; d=json.load(open('golf-data.json')); print(f'Players: {len(d[\"players\"])}, Generated: {d[\"generatedAt\"]}')"

      - name: Copy HTML tool alongside data
        run: |
          mkdir -p docs
          cp golf-data.json docs/
          cp PropsBot-GolfIntel.html docs/index.html
          echo '{ "headers": [{ "source": "**/*.json", "headers": [{ "key": "Access-Control-Allow-Origin", "value": "*" }] }] }' > docs/_headers
          echo 'golf.propsbot.ai' > docs/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
          commit_message: "Update golf data - ${{ github.run_number }}"

      - name: Also commit data to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add golf-data.json history/
          git diff --quiet --cached || git commit -m "Auto-update golf-data.json $(date +'%Y-%m-%d')"
          git push || echo "Nothing to push"
