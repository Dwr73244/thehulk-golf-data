name: Golf Data Update

on:
  schedule:
    # Monday 6 AM UTC — early odds pull + data refresh
    - cron: '0 6 * * 1'
    # Wednesday 6 AM UTC — firmed-up odds pull + Discord alerts
    - cron: '0 6 * * 3'
    # Thursday 6 AM UTC — R1 day, leaderboard + weather
    - cron: '0 6 * * 4'
    # Saturday 6 AM UTC — after R2 cut, leaderboard update
    - cron: '0 6 * * 6'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - '.github/workflows/weekly-scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scraper.py

      - name: Verify output
        run: |
          echo "Checking golf-data.json..."
          ls -la golf-data.json
          python -c "import json; d=json.load(open('golf-data.json')); print(f'Players: {len(d[\"players\"])}, Generated: {d[\"generatedAt\"]}')"

      - name: Copy HTML tool alongside data
        run: |
          mkdir -p docs
          cp golf-data.json docs/
          cp PropsBot-GolfIntel.html docs/index.html
          echo '{ "headers": [{ "source": "**/*.json", "headers": [{ "key": "Access-Control-Allow-Origin", "value": "*" }] }] }' > docs/_headers
          echo 'golf.propsbot.ai' > docs/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
          commit_message: "Update golf data - ${{ github.run_number }}"

      - name: Also commit data to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add golf-data.json history/
          git diff --quiet --cached || git commit -m "Auto-update golf-data.json $(date +'%Y-%m-%d')"
          git push || echo "Nothing to push"
