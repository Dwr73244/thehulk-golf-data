name: Golf Data Update

on:
  schedule:
    # --- OFF-WEEK (Mon-Tue): 1x/day early morning ---
    - cron: '0 5 * * 1'    # Monday 5AM UTC (1AM ET) — weekly reset: detect next tournament, refresh field + early odds
    - cron: '0 5 * * 2'    # Tuesday 5AM UTC (1AM ET) — BallDontLie catch-up: previous tournament data fully settled

    # --- WEDNESDAY (big betting day): 5 runs to catch opening lines + sharp action ---
    - cron: '0 9 * * 3'    # Wednesday  5AM ET — overnight lines, morning refresh
    - cron: '0 15 * * 3'   # Wednesday 11AM ET — pro-am done, tee sheet out, first matchup lines
    - cron: '0 18 * * 3'   # Wednesday  2PM ET — midday line firmness
    - cron: '0 23 * * 3'   # Wednesday  7PM ET — evening sharp action, books finalize
    - cron: '0 2 * * 4'    # Wednesday 10PM ET (Thu 2AM UTC) — overnight snapshot

    # --- TOURNAMENT WEEK (Thu-Sun): every 30 min during peak play ---
    # Leaderboard scores update client-side via ESPN every 60s.
    # This pipeline updates odds, confidence scores, props, matchup predictions,
    # and odds_history.json line snapshots. Cadence closes the freshness gap
    # vs DataGolf (~5min). See /methodology page for details.
    # Covers 7AM ET through 7PM ET every 30 min + overnight snapshots.
    # Thursday (R1)
    - cron: '0,30 11-22 * * 4'       # Thu 7AM-6:30PM ET every 30 min (24 slots)
    - cron: '0 23 * * 4'             # Thu 7PM ET
    - cron: '0 2 * * 5'              # Thu 10PM ET — overnight lines
    # Friday (R2 / cut day)
    - cron: '0,30 11-22 * * 5'       # Fri 7AM-6:30PM ET every 30 min (24 slots)
    - cron: '0 23 * * 5'             # Fri 7PM ET — post-cut lines
    # Saturday (moving day)
    - cron: '0,30 13-22 * * 6'       # Sat 9AM-6:30PM ET every 30 min (20 slots)
    - cron: '0 23 * * 6'             # Sat 7PM ET — Sunday odds set
    # Sunday (final round)
    - cron: '0,30 13-22 * * 0'       # Sun 9AM-6:30PM ET every 30 min (20 slots)
    - cron: '0 23 * * 0'             # Sun 7PM ET — final update
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'PropsBot-GolfIntel.html'
      - '.github/workflows/weekly-scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scraper.py

      - name: Verify output
        run: |
          echo "Checking golf-data.json..."
          ls -la golf-data.json
          python scripts/validate_output.py

      - name: Generate tournament preview pages
        run: python scripts/generate_preview.py

      - name: Generate per-player detail pages
        run: python scripts/generate_player_pages.py

      - name: Copy HTML tool alongside data
        run: |
          mkdir -p docs
          cp golf-data.json docs/
          cp PropsBot-GolfIntel.html docs/index.html
          cp methodology.html docs/methodology.html
          cp calculator.html docs/calculator.html
          cp api.html docs/api.html
          cp line-history.html docs/line-history.html
          cp model_params.json docs/ 2>/dev/null || echo "model_params.json not present, skipping"
          cp backtest-report.json docs/ 2>/dev/null || echo "backtest-report.json not present, skipping"
          cp odds_history.json docs/ 2>/dev/null || echo "odds_history.json not present, skipping"
          cp robots.txt docs/
          cp sitemap.xml docs/
          cp -r previews docs/
          cp -r player docs/ 2>/dev/null || echo "player/ not present, skipping"
          echo '{ "headers": [{ "source": "**/*.json", "headers": [{ "key": "Access-Control-Allow-Origin", "value": "*" }] }] }' > docs/_headers
          echo 'golf.propsbot.ai' > docs/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
          commit_message: "Update golf data - ${{ github.run_number }}"

      - name: Also commit data to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add golf-data.json history/
          git diff --quiet --cached || git commit -m "Auto-update golf-data.json $(date +'%Y-%m-%d')"
          git push || echo "Nothing to push"
