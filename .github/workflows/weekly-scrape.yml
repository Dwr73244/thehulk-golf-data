name: Golf Data Update

on:
  schedule:
    # --- OFF-WEEK (Mon-Tue): 1x/day early morning ---
    - cron: '0 5 * * 1'    # Monday 5AM UTC (1AM ET) — weekly reset: detect next tournament, refresh field + early odds
    - cron: '0 5 * * 2'    # Tuesday 5AM UTC (1AM ET) — BallDontLie catch-up: previous tournament data fully settled

    # --- WEDNESDAY (big betting day): 5 runs to catch opening lines + sharp action ---
    - cron: '0 9 * * 3'    # Wednesday  5AM ET — overnight lines, morning refresh
    - cron: '0 15 * * 3'   # Wednesday 11AM ET — pro-am done, tee sheet out, first matchup lines
    - cron: '0 18 * * 3'   # Wednesday  2PM ET — midday line firmness
    - cron: '0 23 * * 3'   # Wednesday  7PM ET — evening sharp action, books finalize
    - cron: '0 2 * * 4'    # Wednesday 10PM ET (Thu 2AM UTC) — overnight snapshot

    # --- TOURNAMENT WEEK (Thu-Sun): every hour during play ---
    # Leaderboard scores update client-side via ESPN every 60s.
    # This pipeline updates odds, confidence scores, props, and analytics.
    # Covers 7AM ET through 11PM ET (peak play + evening line moves)
    - cron: '0 11 * * 4'   # Thursday  7AM ET
    - cron: '0 12 * * 4'   # Thursday  8AM ET
    - cron: '0 13 * * 4'   # Thursday  9AM ET
    - cron: '0 14 * * 4'   # Thursday 10AM ET
    - cron: '0 15 * * 4'   # Thursday 11AM ET
    - cron: '0 16 * * 4'   # Thursday 12PM ET
    - cron: '0 17 * * 4'   # Thursday  1PM ET
    - cron: '0 18 * * 4'   # Thursday  2PM ET
    - cron: '0 19 * * 4'   # Thursday  3PM ET
    - cron: '0 20 * * 4'   # Thursday  4PM ET
    - cron: '0 21 * * 4'   # Thursday  5PM ET
    - cron: '0 22 * * 4'   # Thursday  6PM ET
    - cron: '0 23 * * 4'   # Thursday  7PM ET
    - cron: '0 2 * * 5'    # Thursday 10PM ET — overnight lines

    - cron: '0 11 * * 5'   # Friday    7AM ET
    - cron: '0 13 * * 5'   # Friday    9AM ET
    - cron: '0 15 * * 5'   # Friday   11AM ET
    - cron: '0 17 * * 5'   # Friday    1PM ET — cut line forming
    - cron: '0 19 * * 5'   # Friday    3PM ET
    - cron: '0 21 * * 5'   # Friday    5PM ET — cut confirmed
    - cron: '0 23 * * 5'   # Friday    7PM ET — post-cut lines

    - cron: '0 11 * * 6'   # Saturday  7AM ET — moving day
    - cron: '0 13 * * 6'   # Saturday  9AM ET
    - cron: '0 15 * * 6'   # Saturday 11AM ET
    - cron: '0 17 * * 6'   # Saturday  1PM ET
    - cron: '0 19 * * 6'   # Saturday  3PM ET
    - cron: '0 21 * * 6'   # Saturday  5PM ET
    - cron: '0 23 * * 6'   # Saturday  7PM ET — Sunday odds set

    - cron: '0 11 * * 0'   # Sunday    7AM ET — final round
    - cron: '0 13 * * 0'   # Sunday    9AM ET
    - cron: '0 15 * * 0'   # Sunday   11AM ET
    - cron: '0 17 * * 0'   # Sunday    1PM ET — leaders on back 9
    - cron: '0 19 * * 0'   # Sunday    3PM ET
    - cron: '0 21 * * 0'   # Sunday    5PM ET — champion crowned
    - cron: '0 23 * * 0'   # Sunday    7PM ET — final update
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scraper.py'
      - 'PropsBot-GolfIntel.html'
      - '.github/workflows/weekly-scrape.yml'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run scraper
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python scraper.py

      - name: Verify output
        run: |
          echo "Checking golf-data.json..."
          ls -la golf-data.json
          python scripts/validate_output.py

      - name: Copy HTML tool alongside data
        run: |
          mkdir -p docs
          cp golf-data.json docs/
          cp PropsBot-GolfIntel.html docs/index.html
          cp robots.txt docs/
          cp sitemap.xml docs/
          echo '{ "headers": [{ "source": "**/*.json", "headers": [{ "key": "Access-Control-Allow-Origin", "value": "*" }] }] }' > docs/_headers
          echo 'golf.propsbot.ai' > docs/CNAME

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
          commit_message: "Update golf data - ${{ github.run_number }}"

      - name: Also commit data to repo
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add golf-data.json history/
          git diff --quiet --cached || git commit -m "Auto-update golf-data.json $(date +'%Y-%m-%d')"
          git push || echo "Nothing to push"
