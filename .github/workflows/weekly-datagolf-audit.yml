name: Weekly DataGolf Audit + Calibration Refresh

# Runs every Monday at 7 AM ET (after the weekly-scrape backtest has settled).
# Three jobs in one workflow:
#   1. DataGolf trust audit — Discord-alerts on SUSPECT/FAIL drift
#   2. Calibration backfill — refresh 2024+2025 (player, event) training set
#      from BDL (~150 API calls), only if local file is stale (>7 days)
#   3. Refit isotonic calibration on combined (live + backfill) corpus,
#      update model_params.json
#
# All artifacts (datagolf-audit.json, history/backfill_calibration.json,
# model_params.json) commit back to main so the deployed model picks them
# up on the next scrape run.

on:
  schedule:
    # Monday 11 AM UTC (7 AM ET) — after weekly-scrape's Mon 5 AM ET run
    - cron: '0 11 * * 1'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force backfill refresh even if file is fresh'
        type: boolean
        default: false

permissions:
  contents: write   # commit the report JSON back to main for transparency

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run DataGolf audit
        id: audit
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        continue-on-error: true
        run: |
          python scripts/audit_datagolf_sg.py
          echo "exitcode=$?" >> $GITHUB_OUTPUT

      - name: Parse verdict
        id: verdict
        if: always()
        run: |
          if [ -f datagolf-audit.json ]; then
            VERDICT=$(python -c "import json; print(json.load(open('datagolf-audit.json')).get('verdict', 'UNKNOWN'))")
            CORR=$(python -c "import json; d=json.load(open('datagolf-audit.json')); print(d.get('stats',{}).get('sgTotal',{}).get('correlation','?'))")
            MAD=$(python -c "import json; d=json.load(open('datagolf-audit.json')); print(d.get('stats',{}).get('sgTotal',{}).get('mad','?'))")
            OVERLAP=$(python -c "import json; print(json.load(open('datagolf-audit.json')).get('overlap', '?'))")
            echo "verdict=$VERDICT" >> $GITHUB_OUTPUT
            echo "corr=$CORR" >> $GITHUB_OUTPUT
            echo "mad=$MAD" >> $GITHUB_OUTPUT
            echo "overlap=$OVERLAP" >> $GITHUB_OUTPUT
          else
            echo "verdict=ERROR" >> $GITHUB_OUTPUT
          fi

      - name: Discord alert on SUSPECT or FAIL
        if: ${{ steps.verdict.outputs.verdict == 'SUSPECT' || steps.verdict.outputs.verdict == 'FAIL' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "No DISCORD_WEBHOOK_URL secret — skipping alert (verdict was ${{ steps.verdict.outputs.verdict }})"
            exit 0
          fi
          VERDICT="${{ steps.verdict.outputs.verdict }}"
          CORR="${{ steps.verdict.outputs.corr }}"
          MAD="${{ steps.verdict.outputs.mad }}"
          OVERLAP="${{ steps.verdict.outputs.overlap }}"
          COLOR=$([ "$VERDICT" = "FAIL" ] && echo "15158332" || echo "15844367")
          curl -X POST -H "Content-Type: application/json" \
            -d "$(printf '{
              "embeds": [{
                "title": "DataGolf SG Trust Audit: %s",
                "description": "DataGolf vs BDL season-SG correlation drifted out of trust range. Inspect the divergent-player list in datagolf-audit.json.",
                "color": %s,
                "fields": [
                  {"name": "Verdict", "value": "%s", "inline": true},
                  {"name": "sgTotal corr", "value": "%s", "inline": true},
                  {"name": "sgTotal MAD", "value": "%s", "inline": true},
                  {"name": "Overlap players", "value": "%s", "inline": true}
                ],
                "footer": {"text": "scripts/audit_datagolf_sg.py | run id ${{ github.run_id }}"}
              }]
            }' "$VERDICT" "$COLOR" "$VERDICT" "$CORR" "$MAD" "$OVERLAP")" \
            "$DISCORD_WEBHOOK_URL"

      - name: Check if calibration backfill is stale (>7 days)
        id: backfill_check
        run: |
          # Manual override: if user clicked workflow_dispatch with force_refresh,
          # treat as stale regardless of file age.
          if [ "${{ inputs.force_refresh }}" = "true" ]; then
            echo "stale=true" >> $GITHUB_OUTPUT
            echo "reason=force_refresh_input" >> $GITHUB_OUTPUT
            echo "Backfill: force_refresh requested"
            exit 0
          fi
          BACKFILL=history/backfill_calibration.json
          if [ ! -f "$BACKFILL" ]; then
            echo "stale=true" >> $GITHUB_OUTPUT
            echo "reason=missing" >> $GITHUB_OUTPUT
          else
            AGE_DAYS=$(( ($(date +%s) - $(stat -c %Y "$BACKFILL")) / 86400 ))
            if [ "$AGE_DAYS" -gt 7 ]; then
              echo "stale=true" >> $GITHUB_OUTPUT
              echo "reason=age_${AGE_DAYS}_days" >> $GITHUB_OUTPUT
            else
              echo "stale=false" >> $GITHUB_OUTPUT
              echo "reason=fresh_${AGE_DAYS}_days" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Backfill status: ${{ steps.backfill_check.outputs.reason }}"

      - name: Refresh calibration backfill from BDL
        if: ${{ steps.backfill_check.outputs.stale == 'true' }}
        env:
          BDL_API_KEY: ${{ secrets.BDL_API_KEY }}
        continue-on-error: true
        run: |
          echo "Backfill stale (${{ steps.backfill_check.outputs.reason }}) — running backfill..."
          python scripts/backfill_calibration.py --seasons 2024 2025

      - name: Refit calibration on combined corpus
        continue-on-error: true
        run: |
          # Whether or not backfill ran, refit against whatever's available.
          # calibrate.py loads both live snapshots and the backfill file when present.
          python scripts/calibrate.py --min-pairs 80

      - name: Commit artifacts to repo (transparency)
        if: ${{ steps.verdict.outputs.verdict != 'ERROR' && steps.verdict.outputs.verdict != 'UNKNOWN' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add datagolf-audit.json
          # Stage these only if they exist (backfill / refit might have been skipped/failed)
          [ -f history/backfill_calibration.json ] && git add history/backfill_calibration.json || true
          [ -f model_params.json ] && git add model_params.json || true
          if git diff --quiet --cached; then
            echo "Nothing to commit."
          else
            git commit -m "Weekly audit + calibration — verdict ${{ steps.verdict.outputs.verdict }}"
            git push || echo "Push failed (probably no remote write perms in fork PR)"
          fi

      - name: Fail the run on FAIL verdict
        if: ${{ steps.verdict.outputs.verdict == 'FAIL' }}
        run: |
          echo "::error::DataGolf audit returned FAIL verdict. See datagolf-audit.json."
          exit 1
